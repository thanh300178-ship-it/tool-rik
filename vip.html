<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIKVIP AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090011;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
padding:20px;
}

.app{
width:340px;
background:#12001f;
border-radius:30px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
}

.top{
padding:20px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:30px;
font-weight:900;
color:white;
font-family:'Orbitron',sans-serif;
}

.logo span{
display:block;
font-size:10px;
color:#b78dff;
margin-top:4px;
}

.main{
padding:20px;
}

.card{
background:rgba(255,255,255,.03);
border-radius:25px;
padding:20px;
border:1px solid rgba(255,255,255,.05);
}

.title{
color:white;
font-size:14px;
font-weight:800;
margin-bottom:20px;
}

.circle{
width:220px;
height:220px;
margin:auto;
border-radius:50%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
background:#14001f;
}

.circle::before{
content:'';
position:absolute;
inset:-8px;
border-radius:50%;

background:conic-gradient(
#ff00d4,
#ff4f81,
#ffcc00,
#8f2fff,
#ff00d4
);

animation:spin 3s linear infinite;
}

.circle::after{
content:'';
position:absolute;
inset:10px;
background:#14001f;
border-radius:50%;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.result{
position:relative;
z-index:2;
font-size:40px;
font-weight:900;
font-family:'Orbitron',sans-serif;
}

.tai{
color:#FFD700;
}

.xiu{
color:#ff3366;
}

.loading{
color:white;
font-size:22px;
}

.session{
margin-top:25px;
height:55px;
background:rgba(255,255,255,.03);
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-weight:800;
color:#d2b6ff;
gap:8px;
}

.session span{
font-family:'Orbitron',sans-serif;
color:white;
}

.conf{
margin-top:20px;
}

.conf-top{
display:flex;
justify-content:space-between;
font-size:14px;
font-weight:800;
color:white;
margin-bottom:10px;
}

#conf-text{
color:#FFD700;
}

.progress{
width:100%;
height:10px;
background:rgba(255,255,255,.05);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#ff00d4,
#ffcc00
);
transition:.3s;
}

.history{
margin-top:20px;
background:rgba(255,255,255,.03);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
}

.h-title{
padding:16px;
color:white;
font-weight:800;
}

.head,
.row{
display:grid;
grid-template-columns:1fr 1fr 1fr;
text-align:center;
align-items:center;
}

.head{
height:40px;
font-size:11px;
font-weight:800;
color:#c8a5ff;
background:rgba(255,255,255,.02);
}

.row{
height:45px;
color:white;
font-size:12px;
border-top:1px solid rgba(255,255,255,.05);
}

.badge{
padding:5px 10px;
border-radius:10px;
font-weight:800;
font-size:11px;
}

.b-tai{
background:rgba(255,215,0,.12);
color:#FFD700;
}

.b-xiu{
background:rgba(255,51,102,.12);
color:#ff3366;
}

.footer{
height:60px;
display:flex;
justify-content:space-around;
align-items:center;
color:#a77fff;
font-weight:800;
font-size:12px;
margin-top:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.active{
color:white;
}

</style>
</head>

<body>

<div class="app">

<div class="top">

<div class="logo">
RIKVIP
<span>AI PREDICTOR</span>
</div>

</div>

<div class="main">

<div class="card">

<div class="title">
KẾT QUẢ DỰ ĐOÁN
</div>

<div class="circle">

<div id="result" class="result loading">
LOADING
</div>

</div>

<div class="session">
PHIÊN
<span id="session">
#000000
</span>
</div>

<div class="conf">

<div class="conf-top">

<div>Độ Tin Cậy</div>

<div id="conf-text">
0%
</div>

</div>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

</div>

</div>

<div class="history">

<div class="h-title">
LỊCH SỬ DỰ ĐOÁN
</div>

<div class="head">
<div>PHIÊN</div>
<div>DỰ ĐOÁN</div>
<div>AI</div>
</div>

<div id="history-body"></div>

</div>

<div class="footer">

<div class="active">AI</div>
<div>HISTORY</div>
<div>VIP</div>

</div>

</div>

</div>

<script>

const API_URL="/predict";

// chống spam history
let lastSession = null;

async function loadPredict(){

try{

const res = await fetch(API_URL + "?t=" + Date.now());

const data = await res.json();

console.log(data);

// ===== CHỈ LẤY PHIÊN HIỆN TẠI =====
const session = data.Phien_hien_tai;

if(!session) return;

// ===== KHÔNG THÊM NẾU TRÙNG PHIÊN =====
if(session == lastSession){
return;
}

lastSession = session;

// ===== DỰ ĐOÁN =====
let predictRaw =
(data.Du_doan || "Tài").toUpperCase();

let predict =
predictRaw.includes("XỈU") ||
predictRaw.includes("XIU")
? "XỈU"
: "TÀI";

// ===== ĐỘ TIN CẬY =====
let confidence =
Math.floor(
(data.Du_doan_confidence || 0.5) * 100
);

// ===== UI =====
const result =
document.getElementById("result");

result.innerText = predict;

result.className =
predict === "TÀI"
? "result tai"
: "result xiu";

// phiên hiện tại
document.getElementById("session").innerText =
"#" + session;

// độ tin cậy
document.getElementById("conf-text").innerText =
confidence + "%";

document.getElementById("bar").style.width =
confidence + "%";

// ===== HISTORY =====
const history =
document.getElementById("history-body");

const row = `
<div class="row">

<div>
#${session}
</div>

<div>
<span class="badge ${predict==="TÀI"?"b-tai":"b-xiu"}">
${predict}
</span>
</div>

<div>
AI
</div>

</div>
`;

history.innerHTML =
row + history.innerHTML;

// giới hạn 10 dòng
const rows =
history.querySelectorAll(".row");

if(rows.length > 10){
rows[rows.length - 1].remove();
}

}catch(err){

console.log(err);

document.getElementById("result").innerText =
"ERROR";

}

}

// load lần đầu
loadPredict();

// mỗi 5 giây check phiên mới
setInterval(loadPredict,5000);

</script>

</body>
</html>
